name: Deploy Website

on:
  push:
   branches:
     -main

jobs:
  build:
    runs-on:ubuntu-latest

    steps:
       -name: Get code
        uses: actions/checkout@v3

       -name: Deploy to Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
